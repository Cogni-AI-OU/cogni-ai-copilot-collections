---
# Ansible playbook file.
# Usage: ansible-playbook .devcontainer/provision.yml
# Note: Keep keys and lists in alphabetical order.
- name: Provision dev container
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: Load apt packages from file
      ansible.builtin.set_fact:
        apt_packages: >-
          {{ lookup('file', playbook_dir + '/apt-packages.txt').splitlines()
          | map('trim') | reject('equalto', '') | reject('match', '^#') | list }}
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
    - name: Install apt packages
      ansible.builtin.apt:
        name: '{{ apt_packages }}'
        state: present
    - name: Install ansible via pipx
      ansible.builtin.command: pipx install --include-deps ansible
      args:
        creates: '{{ ansible_env.HOME }}/.local/bin/ansible'
      become: false
    - name: Inject ansible python requirements
      ansible.builtin.command:
        argv:
          - pipx
          - runpip
          - ansible
          - install
          - -r
          - '{{ playbook_dir }}/requirements-ansible.txt'
      become: false
      register: pipx_runpip
      changed_when: "'Successfully installed' in (pipx_runpip.stdout + pipx_runpip.stderr)"
      failed_when: pipx_runpip.rc != 0
    - name: Install python requirements
      ansible.builtin.pip:
        requirements: '{{ playbook_dir }}/requirements.txt'
        extra_args: --break-system-packages --user
        state: present
      become: false
    - name: Install Copilot CLI
      ansible.builtin.command:
        cmd: npm install -g @github/copilot
      become: false
      changed_when: false
    - name: Add Cogni AI plugin marketplace
      ansible.builtin.command:
        cmd: gh copilot plugin marketplace add Cogni-AI-OU/cogni-ai-agentic-collections
      become: false
      register: marketplace_add
      changed_when: "'already exists' not in (marketplace_add.stdout + marketplace_add.stderr) | lower"
      failed_when: marketplace_add.rc != 0
    - name: Install Cogni AI agentic plugins
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          gh copilot plugin install "{{ item }}@cogni-ai-agentic-collections"
        executable: /bin/bash
      become: false
      register: plugin_install
      changed_when: "'already installed' not in (plugin_install.stdout + plugin_install.stderr) | lower"
      loop:
        - cogni-ai-agentic-ops
        - cogni-ai-architect
        - cogni-ai-coder
        - cogni-ai-developer
        - cogni-ai-dev-ops
        - cogni-ai-git-ops
        - cogni-ai-github-ops
        - cogni-ai-programmer
        - cogni-ai-tester
    - name: Install pre-commit hooks
      ansible.builtin.command: pre-commit install
      args:
        chdir: '{{ playbook_dir }}/..'
        creates: .git/hooks/pre-commit
      become: false
