---
name: Copilot Setup Steps
# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .devcontainer/requirements.txt
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .devcontainer/requirements.txt
jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install Cogni AI agentic plugins
        shell: bash
        run: |
          gh copilot plugin marketplace add Cogni-AI-OU/cogni-ai-agentic-collections
          gh copilot plugin install cogni-ai-agentic-ops@cogni-ai-agentic-collections
          gh copilot plugin install cogni-ai-architect@cogni-ai-agentic-collections
          gh copilot plugin install cogni-ai-coder@cogni-ai-agentic-collections
          gh copilot plugin install cogni-ai-dev-ops@cogni-ai-agentic-collections
          gh copilot plugin install cogni-ai-developer@cogni-ai-agentic-collections
          gh copilot plugin install cogni-ai-git-ops@cogni-ai-agentic-collections
          gh copilot plugin install cogni-ai-github-ops@cogni-ai-agentic-collections
          gh copilot plugin install cogni-ai-programmer@cogni-ai-agentic-collections
          gh copilot plugin install cogni-ai-tester@cogni-ai-agentic-collections
      - uses: actions/setup-python@v6.1.0
        with:
          python-version: '3.12'
      - name: Restore Python user site
        id: python-user-site
        uses: actions/cache@v5.0.1
        with:
          path: ~/.local
          key: ${{ runner.os }}-pip-${{ hashFiles('.devcontainer/requirements.txt') }}
      - name: Install Python dependencies
        if: steps.python-user-site.outputs.cache-hit != 'true'
        run: python -m pip install --user -r .devcontainer/requirements.txt
      - name: Ensure local bin on PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
