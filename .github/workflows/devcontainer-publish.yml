---
# Note: Keep keys and envs in alphabetical order.
name: Development Containers (Publish)
# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:
permissions:
  contents: read
  packages: write
env:
  IS_DEFAULT_BRANCH: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
jobs:
  publish:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - is_default: true
            platform: ubuntu-noble
            variant: noble
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.actor }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        env:
          IS_RELEASE: ${{ env.IS_DEFAULT_BRANCH == 'true' || startsWith(github.ref, 'refs/tags/v') }}
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            prefix=devcontainer-
          tags: |
            # Immutable versioned tags: devcontainer-v1.0.4-ubuntu-noble
            type=semver,pattern={{version}}-${{ matrix.platform }},enable=${{ env.IS_TAG == 'true' }}
            # Distro rolling tags: devcontainer-ubuntu-noble
            type=raw,value=${{ matrix.platform }},enable=${{ env.IS_RELEASE == 'true' }}
            # Branch-specific platform tags: devcontainer-latest-ubuntu-noble (for default branch)
            type=raw,value=latest-${{ matrix.platform }},enable=${{ env.IS_DEFAULT_BRANCH == 'true' }}
            # Global rolling tags (only for default platform)
            type=semver,pattern={{version}},enable=${{ matrix.is_default == true && env.IS_TAG == 'true' }}
            type=raw,value=latest,enable=${{ matrix.is_default == true && env.IS_RELEASE == 'true' }}
            # Fallback SHA-based tag (always available for workflow_dispatch on non-release branches)
            type=sha,enable=${{ env.IS_RELEASE != 'true' }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          build-args: |
            VARIANT=${{ matrix.variant }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: .devcontainer/Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
