---
name: Skill Validator ‚Äî PR Gate
on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - '**/SKILL.md'
permissions:
  contents: read
jobs:
  skill-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      # ‚îÄ‚îÄ Download & cache skill-validator ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Get cache key date
        id: cache-date
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      - name: Restore skill-validator from cache
        id: cache-sv
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: .skill-validator
          key: skill-validator-linux-x64-${{ steps.cache-date.outputs.date }}
          restore-keys: |
            skill-validator-linux-x64-
      - name: Download skill-validator
        if: steps.cache-sv.outputs.cache-hit != 'true'
        run: |
          mkdir -p .skill-validator
          SV_URL="https://github.com/dotnet/skills/releases/download/skill-validator-nightly/skill-validator-linux-x64.tar.gz"
          curl -fsSL "$SV_URL" \
            -o .skill-validator/skill-validator-linux-x64.tar.gz
          tar -xzf .skill-validator/skill-validator-linux-x64.tar.gz -C .skill-validator
          rm .skill-validator/skill-validator-linux-x64.tar.gz
          chmod +x .skill-validator/skill-validator
      - name: Save skill-validator to cache
        if: steps.cache-sv.outputs.cache-hit != 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: .skill-validator
          key: skill-validator-linux-x64-${{ steps.cache-date.outputs.date }}

      # ‚îÄ‚îÄ Detect changed skills & agents ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Detect changed skills and agents
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             [ "${{ github.event_name }}" = "workflow_call" ]; then
            CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          else
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          fi

          # 1. Detect Skill Directories
          # Any directory containing SKILL.md that was touched
          SKILL_DIRS_FROM_MD=$(printf '%s\n' "$CHANGED_FILES" | grep 'SKILL\.md$' | xargs -r -I {} dirname "{}" || true)
          # Any directory under skills/* that was touched
          SKILL_DIRS_FROM_SKILLS=$(echo "$CHANGED_FILES" | grep -oP '^skills/[^/]+' || true)
          # Any directory under plugins/*/skills/* that was touched
          SKILL_DIRS_FROM_PLUGINS=$(echo "$CHANGED_FILES" | grep -oP '^plugins/[^/]+/skills/[^/]+' || true)

          # Combine and de-duplicate skill directories
          # shellcheck disable=SC2086
          UNIQUE_SKILL_DIRS=$( \
            printf "%s\n%s\n%s" "$SKILL_DIRS_FROM_MD" "$SKILL_DIRS_FROM_SKILLS" "$SKILL_DIRS_FROM_PLUGINS" \
            | grep . | sort -u || true)

          # 2. Detect Agent Files
          # Any .agent.md file under agents/
          AGENT_FILES_FROM_AGENTS=$(echo "$CHANGED_FILES" | grep -oP '^agents/[^/]+\.agent\.md$' || true)
          # Any .agent.md file under plugins/*/agents/
          AGENT_FILES_FROM_PLUGINS=$(echo "$CHANGED_FILES" | grep -oP '^plugins/[^/]+/agents/[^/]+\.agent\.md$' || true)
          # Any .agent.md file in root (for compatibility)
          AGENT_FILES_FROM_ROOT=$(echo "$CHANGED_FILES" | grep -oP '^[^/]+\.agent\.md$' || true)

          # Combine and de-duplicate agent files
          # shellcheck disable=SC2086
          UNIQUE_AGENT_FILES=$( \
            printf "%s\n%s\n%s" "$AGENT_FILES_FROM_AGENTS" "$AGENT_FILES_FROM_PLUGINS" "$AGENT_FILES_FROM_ROOT" \
            | grep . | sort -u || true)

          # Build CLI arguments for --skills
          SKILL_ARGS=""
          for dir in $UNIQUE_SKILL_DIRS; do
            if [ -d "$dir" ]; then
              SKILL_ARGS="${SKILL_ARGS}${SKILL_ARGS:+ }$dir"
            fi
          done

          # Build CLI arguments for --agents
          AGENT_ARGS=""
          for f in $UNIQUE_AGENT_FILES; do
            if [ -f "$f" ]; then
              AGENT_ARGS="${AGENT_ARGS}${AGENT_ARGS:+ }$f"
            fi
          done
          SKILL_COUNT=$(echo "$SKILL_ARGS" | wc -w || echo 0)
          AGENT_COUNT=$(echo "$AGENT_ARGS" | wc -w || echo 0)
          TOTAL=$((SKILL_COUNT + AGENT_COUNT))
          {
            echo "skill_args=$SKILL_ARGS"
            echo "agent_args=$AGENT_ARGS"
            echo "total=$TOTAL"
            echo "skill_count=$SKILL_COUNT"
            echo "agent_count=$AGENT_COUNT"
          } >> "$GITHUB_OUTPUT"
          echo "Found $SKILL_COUNT skill dir(s) and $AGENT_COUNT agent file(s) to check."

      # ‚îÄ‚îÄ Run skill-validator check ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Run skill-validator check
        id: check
        if: steps.detect.outputs.total != '0'
        shell: bash
        run: |
          SKILL_ARGS="${{ steps.detect.outputs.skill_args }}"
          AGENT_ARGS="${{ steps.detect.outputs.agent_args }}"
          CMD=".skill-validator/skill-validator check --verbose"
          if [ -n "$SKILL_ARGS" ]; then
            CMD="$CMD --skills $SKILL_ARGS"
          fi
          if [ -n "$AGENT_ARGS" ]; then
            CMD="$CMD --agents $AGENT_ARGS"
          fi
          echo "Running: $CMD"

          # Capture output; don't fail the workflow (warn-only mode)
          set +e
          # Strip ANSI colors for reliable regex matching
          OUTPUT=$($CMD 2>&1 | sed 's/\x1b\[[0-9;]*m//g')
          EXIT_CODE=$?
          set -e

          # Downgrade "2 directories deep" findings to warnings (project policy allows up to 2 levels)
          if grep -q "is 2 directories deep ‚Äî maximum is 1 level from SKILL.md" <<< "$OUTPUT"; then
            echo "Downgrading 2-level depth findings to warnings per project policy."
            # Replace ‚ùå with ‚öÝ and add a note
            P="is 2 directories deep ‚Äî maximum is 1 level from SKILL.md"
            # shellcheck disable=SC2001
            OUTPUT=$(sed "s/‚ùå \(.* $P\)/‚öÝ \1 (Allowed by project policy)/g" <<< "$OUTPUT")

            # If no other errors remain, treat the run as successful
            if ! grep -q "‚ùå" <<< "$OUTPUT"; then
              EXIT_CODE=0
            fi
          fi
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          # Save output to file (multi-line safe)
          echo "$OUTPUT" > sv-output.txt
          echo "$OUTPUT"

      # ‚îÄ‚îÄ Upload results for the commenting workflow ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Save metadata
        if: always()
        run: |
          mkdir -p sv-results
          {
            echo "${{ github.event.pull_request.number }}" > sv-results/pr-number.txt
            echo "${{ steps.detect.outputs.total }}" > sv-results/total.txt
            echo "${{ steps.detect.outputs.skill_count }}" > sv-results/skill-count.txt
            echo "${{ steps.detect.outputs.agent_count }}" > sv-results/agent-count.txt
            echo "${{ steps.check.outputs.exit_code }}" > sv-results/exit-code.txt
          }
          if [ -f sv-output.txt ]; then
            cp sv-output.txt sv-results/sv-output.txt
          fi
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: skill-validator-results
          path: sv-results/
          retention-days: 1
      - name: Post skip notice if no skills changed
        if: steps.detect.outputs.total == '0'
        run: echo "No skill or agent files changed in this PR ‚Äî skipping validation."
