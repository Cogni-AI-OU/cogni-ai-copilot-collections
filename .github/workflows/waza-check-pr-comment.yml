---
name: Waza Check — PR Comment
# Posts results from the "Waza Check" workflow as a PR comment.
# Runs with write permissions but never checks out PR code,
# so it is safe for fork PRs.
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: The run ID of the gate workflow
        required: true
        type: string
  workflow_call:
    inputs:
      run_id:
        description: The run ID of the gate workflow
        required: true
        type: string
  workflow_run:
    workflows:
      - Waza Check
    types:
      - completed
permissions:
  issues: write
  pull-requests: write
  actions: read
jobs:
  comment:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_call' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request')
    steps:
      - name: Download results artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: waza-check-results
          run-id: ${{ inputs.run_id || github.event.workflow_run.id }}
          github-token: ${{ github.token }}
      - name: Post PR comment with results
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        with:
          script: |-
            const fs = require('fs');
            const rawPr = fs.readFileSync('waza-results/pr-number.txt', 'utf8').trim();
            const prNumber = parseInt(rawPr, 10);
            if (isNaN(prNumber)) {
              console.log(`Invalid or missing PR number ('${rawPr}') — cannot post comment.`);
              return;
            }
            const exitCode = fs.readFileSync('waza-results/exit-code.txt', 'utf8').trim();
            const rawOutput = fs.readFileSync('waza-results/waza-output.txt', 'utf8').trim()
              .replace(/```/g, '\\`\\`\\`');
            const changedSkills = fs.readFileSync('waza-results/changed-skills.txt', 'utf8').trim();
            const hasResultsJson = fs.existsSync('waza-results/results.json');
            const marker = '<!-- waza-check-results -->';
            const changedCount = changedSkills ? changedSkills.split('\n').filter(Boolean).length : 0;
            const errorCount = (rawOutput.match(/❌/g) || []).length;
            const warningCount = (rawOutput.match(/⚠/g) || []).length;
            let verdict = '✅ All checks passed';
            if (exitCode !== '0' || errorCount > 0) {
              verdict = '⛔ Findings need attention';
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'waza-check-error',
                  color: 'B60205',
                  description: 'Waza evaluation reported errors'
                });
              } catch (error) {
                if (error.status !== 422) console.error('Error creating label:', error);
              }
              const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber
              });
              if (!currentLabels.find(l => l.name === 'waza-check-error')) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: ['waza-check-error']
                });
              }
            } else if (warningCount > 0) {
              verdict = '⚠️ Warnings or advisories found';
            } else {
              try {
                const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber
                });
                if (currentLabels.find(l => l.name === 'waza-check-error')) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    name: 'waza-check-error'
                  });
                }
              } catch (error) {
                if (error.status !== 404) console.error('Error removing label:', error);
              }
            }
            const summaryLines = rawOutput
              .split('\n')
              .filter(Boolean)
              .slice(0, 10);
            const findingsTable = summaryLines.length === 0
              ? ['_No findings were emitted._']
              : [
                  '| Level | Finding |',
                  '|---|---|',
                  ...summaryLines.map(line => {
                    const level = line.startsWith('❌')
                      ? '❌'
                      : line.startsWith('⚠')
                        ? '⚠️'
                        : line.startsWith('✅')
                          ? '✅'
                          : (exitCode !== '0' ? '⛔' : 'ℹ️');
                    const text = line.replace(/^[❌⚠️✅\s]+/, '').replace(/\|/g, '\\|');
                    return `| ${level} | ${text} |`;
                  }),
                ];
            const body = [
              marker,
              '## 🔍 Skill Readiness Check',
              '',
              `**${verdict}**`,
              '',
              '| Scope | Checked |',
              '|---|---:|',
              `| Skills changed | ${changedCount} |`,
              `| Errors | ${errorCount} |`,
              `| Warnings | ${warningCount} |`,
              '',
              '### Summary',
              '',
              ...findingsTable,
              '',
              hasResultsJson ? '> Detailed results available in the uploaded artifact.' : '',
              '',
              '<details>',
               '<summary>Waza check output</summary>',
              '',
              '```text',
              rawOutput || 'No output captured.',
              '```',
              '',
              '</details>',
            ].filter(Boolean).join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated existing comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              console.log(`Created new PR comment on  #${prNumber}`);
            }
