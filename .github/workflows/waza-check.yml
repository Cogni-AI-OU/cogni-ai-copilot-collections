---
name: Waza Evaluation
on:
  pull_request:
    paths:
      - '**/SKILL.md'
      - '**/*.agent.md'
      - .github/skills/**
      - skills/**
      - plugins/**/skills/**
  push:
    branches:
      - main
    paths:
      - '**/SKILL.md'
      - '**/*.agent.md'
      - .github/skills/**
      - skills/**
      - plugins/**/skills/**
  workflow_dispatch:
    inputs:
      eval-path:
        default: ''
        description: Path to eval.yaml (empty = auto-detect)
        required: false
        type: string
permissions:
  contents: read
jobs:
  run-evaluation:
    name: Run Waza Evaluation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install waza
        run: |
          go install github.com/microsoft/waza/cmd/waza@latest
      - name: Find changed skills
        id: changed-skills
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- '**/SKILL.md' '**/*.agent.md')
          elif [ "${{ github.event_name }}" = "push" ]; then
            CHANGED=$(git diff --name-only HEAD~1...HEAD -- '**/SKILL.md' '**/*.agent.md' 2>/dev/null || echo "")
          else
            CHANGED=""
          fi
          {
            echo "changed<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Changed skill files:"
          echo "$CHANGED"
      - name: Run waza check on changed skills
        id: check
        run: |
          CHANGED="${{ steps.changed-skills.outputs.changed }}"
          FAILED=0
          OUTPUT_LOG=""
          if [ -z "$CHANGED" ]; then
            echo "No skill files changed."
            OUTPUT_LOG="No skill files changed."
          else
            while IFS= read -r skill; do
              [ -z "$skill" ] && continue
              SKILL_DIR="$(dirname "$skill")"
              echo "::group::waza check: $skill"
              if [ -f "$skill" ]; then
                if waza check "$SKILL_DIR" 2>&1; then
                  echo "✅ $skill passed"
                  OUTPUT_LOG="${OUTPUT_LOG}✅ $skill passed\n"
                else
                  echo "::error::$skill failed waza check"
                  FAILED=1
                  OUTPUT_LOG="${OUTPUT_LOG}❌ $skill failed\n"
                fi
              else
                echo "::warning::$skill was deleted, skipping"
                OUTPUT_LOG="${OUTPUT_LOG}⚠ $skill was deleted, skipping\n"
              fi
              echo "::endgroup::"
            done <<< "$CHANGED"
          fi
          {
            echo "failed=$FAILED"
            echo "output_log<<EOF"
            echo -e "$OUTPUT_LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Run evaluation (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: run-eval
        run: |
          EVAL_PATH="${{ github.event.inputs.eval-path }}"
          if [ -n "$EVAL_PATH" ] && [ -f "$EVAL_PATH" ]; then
            waza run "$EVAL_PATH" --output results.json --format json
          elif waza run --discover --output results.json --format json 2>/dev/null; then
            echo "Evaluation completed via discovery"
          else
            echo "No eval target found. Running waza check on root..."
            waza check . 2>/dev/null || true
          fi
      - name: Generate Summary
        if: always()
        run: |
          if [ -f "results.json" ]; then
            waza report results.json --format github >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Save metadata for PR comment
        if: always()
        run: |
          mkdir -p waza-results
          {
            echo "${{ github.event.pull_request.number }}" > waza-results/pr-number.txt
            echo "${{ steps.check.outputs.failed }}" > waza-results/exit-code.txt
            echo "${{ steps.check.outputs.output_log }}" > waza-results/waza-output.txt
            echo "${{ steps.changed-skills.outputs.changed }}" > waza-results/changed-skills.txt
          }
          if [ -f results.json ]; then
            cp results.json waza-results/results.json
          fi
      - name: Upload Results Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: ignore
          name: waza-evaluation-results
          path: |-
            waza-results/
            results.json
          retention-days: 30
