---
name: Waza Check
on:
  pull_request:
    paths:
      - '**/SKILL.md'
      - '**/*.agent.md'
  push:
    branches:
      - main
    paths:
      - '**/SKILL.md'
      - '**/*.agent.md'
  workflow_dispatch:
    inputs:
      eval-path:
        default: ''
        description: Path to eval.yaml (empty = auto-detect)
        required: false
        type: string
permissions:
  contents: read
jobs:
  run-evaluation:
    name: Run Waza Evaluation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install waza
        run: |
          go install github.com/microsoft/waza/cmd/waza@latest
      - name: Find changed skills
        id: changed-skills
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}"
            CHANGED=$(git diff --name-only --diff-filter=d "origin/${{ github.base_ref }}...HEAD" \
              -- '**/SKILL.md' '**/*.agent.md')
          elif [ "${{ github.event_name }}" = "push" ]; then
            CHANGED=$(git diff --name-only --diff-filter=d "${{ github.event.before }}...${{ github.sha }}" \
              -- '**/SKILL.md' '**/*.agent.md' 2>/dev/null || echo "")
          else
            CHANGED=""
          fi
          {
            echo "changed<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Changed skill files (excluding deleted):"
          echo "$CHANGED"
      - name: Run waza check on changed skills
        id: check
        run: |
          CHANGED="${{ steps.changed-skills.outputs.changed }}"
          FAILED=0
          RAW_OUTPUT=""
          OUTPUT_FILE="$(mktemp)"
          FINAL_FILE="$(mktemp)"
          if [ -z "$CHANGED" ]; then
            echo "No skill files changed."
            printf '%s\n' "No skill files changed." >> "$FINAL_FILE"
          else
            while IFS= read -r skill; do
              [ -z "$skill" ] && continue
              SKILL_DIR="$(dirname "$skill")"
              echo "::group::waza check: $skill"
              : > "$OUTPUT_FILE"
              if waza check "$SKILL_DIR" > "$OUTPUT_FILE" 2>&1; then
                cat "$OUTPUT_FILE"
                {
                  printf '\n## %s\n\n' "$skill"
                  cat "$OUTPUT_FILE"
                  printf '\n'
                } >> "$FINAL_FILE"
              else
                cat "$OUTPUT_FILE"
                echo "::error::$skill failed waza check"
                FAILED=1
                {
                  printf '\n## %s\n\n' "$skill"
                  cat "$OUTPUT_FILE"
                  printf '\n'
                } >> "$FINAL_FILE"
              fi
              echo "::endgroup::"
            done <<< "$CHANGED"
          fi
          RAW_OUTPUT=$(cat "$FINAL_FILE")
          rm -f "$OUTPUT_FILE" "$FINAL_FILE"
          {
            printf '%s\n' "failed=$FAILED"
            printf '%s\n' "output_log<<WAZA_EOF"
            printf '%s\n' "$RAW_OUTPUT"
            printf '%s\n' "WAZA_EOF"
          } >> "$GITHUB_OUTPUT"
          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi
      - name: Run evaluation (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: run-eval
        run: |
          EVAL_PATH="${{ github.event.inputs.eval-path }}"
          if [ -n "$EVAL_PATH" ] && [ -f "$EVAL_PATH" ]; then
            waza run "$EVAL_PATH" --output results.json --format json
          elif waza run --discover --output results.json --format json 2>/dev/null; then
            echo "Evaluation completed via discovery"
          else
            echo "No eval target found. Running waza check on root..."
            waza check . 2>/dev/null || true
          fi
      - name: Generate Summary
        if: always()
        run: |
          if [ -f "results.json" ]; then
            waza report results.json --format github >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Save metadata for PR comment
        if: always()
        run: |
          mkdir -p waza-results
          {
            echo "${{ github.event.pull_request.number }}" > waza-results/pr-number.txt
            echo "${{ steps.check.outputs.failed }}" > waza-results/exit-code.txt
            echo "${{ steps.check.outputs.output_log }}" > waza-results/waza-output.txt
            echo "${{ steps.changed-skills.outputs.changed }}" > waza-results/changed-skills.txt
          }
          if [ -f results.json ]; then
            cp results.json waza-results/results.json
          fi
      - name: Upload Results Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: ignore
          name: waza-check-results
          path: |-
            waza-results/
            results.json
          retention-days: 30
